name: Update rugby schedule data

on:
  schedule:
    # 13:00 UTC Monday and Thursday -- squads/fixtures don't change hourly,
    # twice a week is plenty and keeps this well within free Actions minutes.
    - cron: "0 13 * * 1,4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Build schedule.json
        run: python scripts/build_schedule.py

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update schedule data"
          git push
